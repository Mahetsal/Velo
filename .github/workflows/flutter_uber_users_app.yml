name: Flutter CI (uber_users_app)

on:
  push:
    paths:
      - "uber-clone-template/uber_users_app/**"
      - ".github/workflows/flutter_uber_users_app.yml"
  pull_request:
    paths:
      - "uber-clone-template/uber_users_app/**"
      - ".github/workflows/flutter_uber_users_app.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uber-clone-template/uber_users_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --coverage

  build-apk-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: analyze-test
    defaults:
      run:
        working-directory: uber-clone-template/uber_users_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: uber-clone-template/uber_users_app/build/app/outputs/flutter-apk/app-release.apk
