<!doctype html>
<html lang="en">
<head>

  <title>Velo App Downloads</title>
  <style>

    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    .card { background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 20px; margin-top: 16px; }
    .btn { display: inline-block; padding: 10px 14px; border-radius: 8px; text-decoration: none; background: #2563eb; color: #fff; font-weight: 600; }
    .muted { color: #9ca3af; font-size: 14px; }
    h1, h2 { margin: 0 0 10px; }
    .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
  </style>
</head>
<body>
  <div class="wrap">

      </div>

      <div class="card">
        <h2>Driver App</h2>
        <p class="muted">Build: v1.0.2-beta</p>
        <a class="btn" href="drivers-v1.0.2-beta.apk">Download APK</a>
      </div>

      <div class="card">
        <h2>Admin Panel App</h2>
        <p class="muted">Build: v1.0.2-beta</p>

    </div>

</html>
