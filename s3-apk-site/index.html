<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo App Downloads</title>
    <meta
      name="description"
      content="Download the latest Velo Android apps for riders, drivers, and administrators."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>
    <main class="shell">
      <header class="hero">
        <img class="logo" src="./assets/velo_logo.png" alt="Velo logo" />
        <span class="pill">Android APK Distribution</span>
        <h1>Velo App Center</h1>
        <p>
          Securely download the latest APK builds for your Velo ecosystem.
          Choose your app below and install the newest version.
        </p>
      </header>

      <section class="apps-header">
        <h2>Available Applications</h2>
        <p>Personalized for riders, drivers, and operations teams.</p>
      </section>

      <section id="apps-grid" class="apps-grid" aria-live="polite"></section>
    </main>

    <template id="app-card-template">
      <article class="app-card">
        <div class="app-top">
          <div>
            <h3 class="app-name"></h3>
            <p class="app-role"></p>
          </div>
          <span class="status"></span>
        </div>
        <p class="app-description"></p>
        <div class="app-meta">
          <span class="version"></span>
          <span class="build-date"></span>
        </div>
        <a class="download-btn" target="_blank" rel="noopener noreferrer">
          Download APK
        </a>
      </article>
    </template>

    <script src="./site.js" defer></script>
  </body>
</html>
